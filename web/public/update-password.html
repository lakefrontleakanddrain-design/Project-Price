<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <title>ProjectPrice - Update Password</title>
  <style>
    :root {
      --navy: #0e3a78;
      --emerald: #16a36a;
      --sky: #dce9ff;
      --text: #16385b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Segoe UI, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(14, 58, 120, .08), transparent 34%),
        radial-gradient(circle at bottom right, rgba(22, 163, 106, .12), transparent 28%),
        linear-gradient(160deg, #f5f9ff 0%, #ffffff 55%, #eefcf5 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 460px);
      background: rgba(255,255,255,.94);
      border: 1px solid #d8e6fa;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(14, 58, 120, .12);
      padding: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      object-fit: cover;
    }
    h1 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 1.65rem;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.5;
      color: #4a6a8a;
    }
    label {
      display: block;
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border: 1px solid #bfd2ee;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(14, 58, 120, .08);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--navy), #1355ad);
      color: #fff;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled {
      opacity: .65;
      cursor: wait;
    }
    .status {
      display: none;
      border-radius: 12px;
      padding: 11px 12px;
      margin-bottom: 14px;
      font-size: .92rem;
    }
    .status.error {
      display: block;
      background: #fdecea;
      color: #7a1a14;
      border: 1px solid #f5b7b1;
    }
    .status.success {
      display: block;
      background: #e6f7ef;
      color: #0d5c35;
      border: 1px solid #a3dfc0;
    }
    .status.info {
      display: block;
      background: #eef5ff;
      color: var(--navy);
      border: 1px solid #c7dbff;
    }
    .links {
      margin-top: 16px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--navy);
      text-decoration: none;
      font-weight: 700;
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/logo.jpg" alt="ProjectPrice" />
      <div>
        <h1>Update Password</h1>
        <p>Use your recovery link to set a new password for your ProjectPrice account.</p>
      </div>
    </div>

    <div id="status" class="status info">Checking your recovery session...</div>

    <form id="passwordForm">
      <label for="password">New Password</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" disabled />

      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter your new password" disabled />

      <button id="submitBtn" type="submit" disabled>Save New Password</button>
    </form>

    <div class="links">
      <a href="/my-estimates.html">Homeowner Login</a>
      <a href="/contractor-portal.html">Contractor Login</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mkmomuwcqekjlxvibxzs.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_-sZOd8EItoR4KmZFJAinfg_vIFzE6YU';

    const statusEl = document.getElementById('status');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const passwordForm = document.getElementById('passwordForm');

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let recoveryReady = false;

    const setStatus = (message, type = 'info') => {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    };

    const setFormEnabled = (enabled) => {
      recoveryReady = enabled;
      passwordInput.disabled = !enabled;
      confirmPasswordInput.disabled = !enabled;
      submitBtn.disabled = !enabled;
    };

    const maybeEnableRecovery = async () => {
      const hash = window.location.hash || '';
      const search = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(hash.startsWith('#') ? hash.slice(1) : hash);

      if (hashParams.get('type') === 'recovery' || search.get('type') === 'recovery') {
        setFormEnabled(true);
        setStatus('Recovery session detected. Set a new password below.', 'info');
        return;
      }

      const { data } = await supabaseClient.auth.getSession();
      if (data?.session) {
        setFormEnabled(true);
        setStatus('Authenticated session detected. Set a new password below.', 'info');
        return;
      }

      setFormEnabled(false);
      setStatus('This recovery link is missing or expired. Request a fresh password recovery link from ProjectPrice support or the admin console.', 'error');
    };

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        setFormEnabled(true);
        setStatus('Recovery session detected. Set a new password below.', 'info');
      }
    });

    passwordForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!recoveryReady) {
        setStatus('Recovery session is not ready yet. Use a valid recovery link.', 'error');
        return;
      }

      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password.length < 8) {
        setStatus('Password must be at least 8 characters.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        setStatus('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password });
        if (error) throw error;
        passwordInput.value = '';
        confirmPasswordInput.value = '';
        setStatus('Password updated. You can now sign in with your new password.', 'success');
      } catch (error) {
        setStatus(error.message || 'Unable to update password.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save New Password';
      }
    });

    maybeEnableRecovery();
  </script>

  <footer style="margin-top:40px;padding:20px 4px;border-top:1px solid #d3e2f5;text-align:center;font-size:.8rem;color:#7a99b8;">
    <p style="margin:0 0 6px;">
      <a href="/privacy-policy.html" style="color:#446684;text-decoration:none;font-weight:700;margin:0 8px;">Privacy Policy</a>
      <a href="/data-deletion.html" style="color:#446684;text-decoration:none;font-weight:700;margin:0 8px;">Data Deletion</a>
      <a href="/" style="color:#446684;text-decoration:none;font-weight:700;margin:0 8px;">Home</a>
    </p>
    <p style="margin:0;">&copy; 2026 ProjectPrice. All rights reserved.</p>
  </footer>

</body>
</html>
