name: projectprice_app
description: Homeowner-facing ProjectPrice app.
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.2
  http: ^1.2.2
  google_generative_ai: ^0.4.6
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon_launcher.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon_base.jpg
