name: Video Rotation Publish

on:
  workflow_dispatch:
    inputs:
      rebuild_only:
        description: "Rebuild pages/feeds only (no new video item)"
        required: true
        default: true
        type: boolean
      source_video_url:
        description: "Public URL to source MP4 (optional when rebuild_only is false)"
        required: false
        type: string
      source_video_path:
        description: "Repo-relative source MP4 path (optional when rebuild_only is false)"
        required: false
        type: string
      site_base_url:
        description: "Public site base URL for feed links"
        required: true
        default: "https://projectpriceapp.com"
        type: string

permissions:
  contents: write

jobs:
  rotate-process-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Select rotating topic
        id: topic
        run: |
          if [ "${{ inputs.rebuild_only }}" = "true" ]; then
            npm run video:next-topic -- --dry-run
          else
            npm run video:next-topic
          fi

      - name: Resolve source video
        if: ${{ inputs.rebuild_only == false }}
        run: |
          FALLBACK_SOURCE_URL="https://filesamples.com/samples/video/mp4/sample_640x360.mp4"
          mkdir -p tmp
          if [ -n "${{ inputs.source_video_url }}" ]; then
            echo "Using source_video_url input"
            curl -L --fail "${{ inputs.source_video_url }}" -o tmp/input.mp4
          elif [ -n "${{ inputs.source_video_path }}" ]; then
            echo "Using source_video_path input"
            if [ ! -f "${{ inputs.source_video_path }}" ]; then
              echo "source_video_path not found: ${{ inputs.source_video_path }}"
              exit 1
            fi
            cp "${{ inputs.source_video_path }}" tmp/input.mp4
          else
            echo "No source input provided. Using fallback sample MP4 for test run."
            curl -L --fail "$FALLBACK_SOURCE_URL" -o tmp/input.mp4
          fi

      - name: Process platform video outputs
        if: ${{ inputs.rebuild_only == false }}
        run: |
          npm run video:process-social -- --input=tmp/input.mp4

      - name: Publish new video item and rebuild feeds
        if: ${{ inputs.rebuild_only == false }}
        run: |
          npm run video:publish -- \
            --source=infra/video/output/youtube-shorts-1080x1920.mp4 \
            --title="${{ steps.topic.outputs.topic_output }}" \
            --topic="${{ steps.topic.outputs.topic_output }}" \
            --site-base-url="${{ inputs.site_base_url }}"

      - name: Rebuild pages/feeds only
        if: ${{ inputs.rebuild_only == true }}
        run: |
          npm run video:publish-rebuild

      - name: Commit and push changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "Auto: rotate/publish ProjectPrice video feed"
          git push origin HEAD:main
