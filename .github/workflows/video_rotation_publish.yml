name: Video Rotation Publish

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      source_video_url:
        description: "Public URL to source MP4 (optional)"
        required: false
        type: string
      source_video_path:
        description: "Repo-relative source MP4 path (optional)"
        required: false
        type: string
      site_base_url:
        description: "Public site base URL for feed links"
        required: false
        default: "https://projectpriceapp.com"
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rotate-process-publish:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.VIDEO_AUTORUN_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve run options
        id: opts
        run: |
          SOURCE_VIDEO_URL_INPUT="${{ inputs.source_video_url }}"
          SOURCE_VIDEO_PATH_INPUT="${{ inputs.source_video_path }}"
          SITE_BASE_URL_INPUT="${{ inputs.site_base_url }}"

          if [ -z "$SITE_BASE_URL_INPUT" ]; then
            SITE_BASE_URL_INPUT="https://projectpriceapp.com"
          fi

          echo "source_video_url=$SOURCE_VIDEO_URL_INPUT" >> "$GITHUB_OUTPUT"
          echo "source_video_path=$SOURCE_VIDEO_PATH_INPUT" >> "$GITHUB_OUTPUT"
          echo "site_base_url=$SITE_BASE_URL_INPUT" >> "$GITHUB_OUTPUT"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Gemini dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-genai

      - name: Select rotating topic
        id: topic
        run: |
          npm run video:next-topic

      - name: Resolve source video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_VIDEO_MODEL: ${{ vars.GEMINI_VIDEO_MODEL }}
          GEMINI_VIDEO_ASPECT_RATIO: ${{ vars.GEMINI_VIDEO_ASPECT_RATIO }}
          GEMINI_VIDEO_RESOLUTION: ${{ vars.GEMINI_VIDEO_RESOLUTION }}
          GEMINI_VIDEO_DURATION_SECONDS: ${{ vars.GEMINI_VIDEO_DURATION_SECONDS }}
          GEMINI_VIDEO_TIMEOUT_SECONDS: ${{ vars.GEMINI_VIDEO_TIMEOUT_SECONDS }}
        run: |
          set -euo pipefail
          mkdir -p tmp
          if [ -n "${{ steps.opts.outputs.source_video_url }}" ]; then
            echo "Using source_video_url input"
            curl -L --fail --retry 3 --retry-delay 2 "${{ steps.opts.outputs.source_video_url }}" -o tmp/input.mp4
          elif [ -n "${{ steps.opts.outputs.source_video_path }}" ]; then
            echo "Using source_video_path input"
            if [ ! -f "${{ steps.opts.outputs.source_video_path }}" ]; then
              echo "source_video_path not found: ${{ steps.opts.outputs.source_video_path }}"
              exit 1
            fi
            cp "${{ steps.opts.outputs.source_video_path }}" tmp/input.mp4
          else
            if [ -z "${GEMINI_API_KEY:-}" ]; then
              echo "Missing secrets.GEMINI_API_KEY and no source_video_url/source_video_path provided."
              exit 1
            fi
            echo "No source input provided. Generating source video via Gemini/Veo."
            python infra/scripts/generate_gemini_video.py \
              --prompt "${{ steps.topic.outputs.topic_prompt }}" \
              --output tmp/input.mp4
          fi

      - name: Process platform video outputs
        run: |
          npm run video:process-social -- --input=tmp/input.mp4

      - name: Publish new video item and rebuild feeds
        run: |
          npm run video:publish -- \
            --source=infra/video/output/youtube-shorts-1080x1920.mp4 \
            --title="${{ steps.topic.outputs.topic_output }}" \
            --topic="${{ steps.topic.outputs.topic_output }}" \
            --site-base-url="${{ steps.opts.outputs.site_base_url }}"

      - name: Commit and push changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "Auto: rotate/publish ProjectPrice video feed"
          git push origin HEAD:main
